naftiko: 1.0.0-alpha2
info:
  label: Wolfram|Alpha AI Knowledge Integration
  description: Unified capability for integrating Wolfram|Alpha computational knowledge into AI applications. Combines the
    LLM API (structured results for AI), Short Answers API (concise factual answers), and Spoken Results API (voice-ready
    responses) into a single interface for AI assistant developers and chatbot engineers.
  tags:
  - AI
  - Chatbot
  - Computational Knowledge
  - LLM
  - Natural Language Processing
  - Wolfram Alpha
  created: '2026-05-03'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    WOLFRAM_ALPHA_APP_ID: WOLFRAM_ALPHA_APP_ID
capability:
  consumes:
  - type: http
    namespace: wolfram-llm
    baseUri: https://www.wolframalpha.com/api/v1
    description: Wolfram|Alpha LLM API for computational knowledge results.
    authentication:
      type: apikey
      key: appid
      value: '{{WOLFRAM_ALPHA_APP_ID}}'
      placement: query
    resources:
    - name: queries
      path: /llm-api
      description: Submit natural language queries for LLM-optimized computational results.
      operations:
      - name: query-llm-api
        method: GET
        description: Submit a natural language query and receive computational results formatted for LLM consumption.
        inputParameters:
        - name: input
          in: query
          type: string
          required: true
          description: URL-encoded natural language query string.
        - name: maxchars
          in: query
          type: integer
          required: false
          description: Maximum characters in response. Default 6800.
        - name: units
          in: query
          type: string
          required: false
          description: 'Measurement system: metric or imperial.'
        - name: timezone
          in: query
          type: string
          required: false
          description: IANA timezone name for context.
        - name: latlong
          in: query
          type: string
          required: false
          description: Latitude,longitude for location-aware results.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: wolfram-short
    baseUri: https://api.wolframalpha.com/v1
    description: Wolfram|Alpha Short Answers API for concise factual responses.
    authentication:
      type: apikey
      key: appid
      value: '{{WOLFRAM_ALPHA_APP_ID}}'
      placement: query
    resources:
    - name: answers
      path: /result
      description: Get a single concise answer to a natural language query.
      operations:
      - name: get-short-answer
        method: GET
        description: Submit a query and receive a single plain-text answer.
        inputParameters:
        - name: i
          in: query
          type: string
          required: true
          description: URL-encoded input query string.
        - name: units
          in: query
          type: string
          required: false
          description: 'Measurement system: metric or imperial.'
        - name: timeout
          in: query
          type: integer
          required: false
          description: Maximum processing time in seconds.
        outputRawFormat: text
        outputParameters:
        - name: answer
          type: string
          value: $.
  - type: http
    namespace: wolfram-spoken
    baseUri: https://api.wolframalpha.com/v1
    description: Wolfram|Alpha Spoken Results API for voice delivery.
    authentication:
      type: apikey
      key: appid
      value: '{{WOLFRAM_ALPHA_APP_ID}}'
      placement: query
    resources:
    - name: spoken-results
      path: /spoken
      description: Get spoken-word formatted answers for audio delivery.
      operations:
      - name: get-spoken-result
        method: GET
        description: Submit a query and receive a plain-text answer formatted for text-to-speech.
        inputParameters:
        - name: i
          in: query
          type: string
          required: true
          description: URL-encoded input query string.
        - name: units
          in: query
          type: string
          required: false
          description: 'Measurement system: metric or imperial.'
        - name: timeout
          in: query
          type: integer
          required: false
          description: Maximum processing time in seconds.
        outputRawFormat: text
        outputParameters:
        - name: spoken_result
          type: string
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: wolfram-ai-api
    description: Unified REST API for AI Knowledge Integration with Wolfram|Alpha.
    resources:
    - path: /v1/queries/llm
      name: llm-queries
      description: LLM-optimized computational knowledge queries.
      operations:
      - method: GET
        name: query-llm
        description: Query Wolfram|Alpha for LLM-optimized computational results.
        call: wolfram-llm.query-llm-api
        with:
          input: rest.input
          maxchars: rest.maxchars
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/queries/short-answer
      name: short-answers
      description: Concise plain-text factual answers.
      operations:
      - method: GET
        name: get-short-answer
        description: Get a concise plain-text answer from Wolfram|Alpha.
        call: wolfram-short.get-short-answer
        with:
          i: rest.query
        outputParameters:
        - type: string
          mapping: $.
    - path: /v1/queries/spoken
      name: spoken-results
      description: Voice-optimized computational results.
      operations:
      - method: GET
        name: get-spoken-result
        description: Get a Wolfram|Alpha answer formatted for text-to-speech.
        call: wolfram-spoken.get-spoken-result
        with:
          i: rest.query
        outputParameters:
        - type: string
          mapping: $.
  - type: mcp
    port: 9090
    namespace: wolfram-ai-mcp
    transport: http
    description: MCP server for AI-assisted Wolfram|Alpha knowledge integration.
    tools:
    - name: query-wolfram-for-llm
      description: Query Wolfram|Alpha for computational knowledge results optimized for LLM processing. Returns structured
        text with interpretation and data.
      hints:
        readOnly: true
        openWorld: true
      call: wolfram-llm.query-llm-api
      with:
        input: tools.input
        maxchars: tools.maxchars
      outputParameters:
      - type: object
        mapping: $.
    - name: get-short-factual-answer
      description: Get a single concise plain-text factual answer from Wolfram|Alpha. Ideal for chatbot responses and AI assistant
        integrations.
      hints:
        readOnly: true
        openWorld: true
      call: wolfram-short.get-short-answer
      with:
        i: tools.query
      outputParameters:
      - type: string
        mapping: $.
    - name: get-spoken-answer
      description: Get a Wolfram|Alpha answer formatted for voice delivery. Returns natural language text ready for text-to-speech
        synthesis.
      hints:
        readOnly: true
        openWorld: true
      call: wolfram-spoken.get-spoken-result
      with:
        i: tools.query
      outputParameters:
      - type: string
        mapping: $.
