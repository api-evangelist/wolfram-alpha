naftiko: "1.0.0-alpha1"

info:
  label: "Wolfram|Alpha LLM API"
  description: "Computational knowledge API delivering structured results optimized for large language model consumption."
  tags:
    - AI
    - Computational Knowledge
    - LLM
    - Natural Language Processing
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      WOLFRAM_ALPHA_APP_ID: WOLFRAM_ALPHA_APP_ID

capability:
  consumes:
    - type: http
      namespace: wolfram-llm
      baseUri: https://www.wolframalpha.com/api/v1
      description: "Wolfram|Alpha LLM API for computational knowledge results."
      authentication:
        type: apikey
        key: appid
        value: "{{WOLFRAM_ALPHA_APP_ID}}"
        placement: query
      resources:
        - name: queries
          path: /llm-api
          description: "Submit natural language queries for LLM-optimized computational results."
          operations:
            - name: query-llm-api
              method: GET
              description: "Submit a natural language query and receive computational results formatted for LLM consumption."
              inputParameters:
                - name: input
                  in: query
                  type: string
                  required: true
                  description: "URL-encoded natural language query string."
                - name: maxchars
                  in: query
                  type: integer
                  required: false
                  description: "Maximum characters in response. Default 6800."
                - name: units
                  in: query
                  type: string
                  required: false
                  description: "Measurement system: metric or imperial."
                - name: timezone
                  in: query
                  type: string
                  required: false
                  description: "IANA timezone name for context."
                - name: latlong
                  in: query
                  type: string
                  required: false
                  description: "Latitude,longitude for location-aware results."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: wolfram-llm-rest
      resources:
        - path: /v1/queries
          name: queries
          description: "Query Wolfram|Alpha for computational knowledge."
          operations:
            - method: GET
              name: query-llm-api
              description: "Submit a query to the Wolfram|Alpha LLM API."
              call: "wolfram-llm.query-llm-api"
              with:
                input: "rest.input"
                maxchars: "rest.maxchars"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: wolfram-llm-mcp
      transport: http
      tools:
        - name: query-wolfram-llm
          description: "Query Wolfram|Alpha for computational knowledge results optimized for LLM use."
          hints:
            readOnly: true
            openWorld: true
          call: "wolfram-llm.query-llm-api"
          with:
            input: "tools.input"
            maxchars: "tools.maxchars"
          outputParameters:
            - type: object
              mapping: "$."
