naftiko: "1.0.0-alpha1"

info:
  label: "Wolfram|Alpha Full Results API"
  description: "Full-featured computational knowledge API with pod-based results, disambiguation, and async delivery."
  tags:
    - Computation
    - Full Results
    - Natural Language Processing
    - Wolfram Alpha
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      WOLFRAM_ALPHA_APP_ID: WOLFRAM_ALPHA_APP_ID

capability:
  consumes:
    - type: http
      namespace: wolfram-full
      baseUri: https://api.wolframalpha.com/v2
      description: "Wolfram|Alpha Full Results API with complete pod data."
      authentication:
        type: apikey
        key: appid
        value: "{{WOLFRAM_ALPHA_APP_ID}}"
        placement: query
      resources:
        - name: queries
          path: /query
          description: "Submit queries for full pod-based computational results."
          operations:
            - name: query-full-results
              method: GET
              description: "Submit a natural language query for full results with disambiguation and drilldown."
              inputParameters:
                - name: input
                  in: query
                  type: string
                  required: true
                  description: "URL-encoded query string."
                - name: output
                  in: query
                  type: string
                  required: false
                  description: "Response format: xml or json."
                - name: format
                  in: query
                  type: string
                  required: false
                  description: "Content formats: image, plaintext, mathml, etc."
                - name: includepodid
                  in: query
                  type: string
                  required: false
                  description: "Include only pods with these IDs."
                - name: units
                  in: query
                  type: string
                  required: false
                  description: "Measurement system: metric or imperial."
                - name: timeout
                  in: query
                  type: integer
                  required: false
                  description: "Maximum processing time in seconds."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: wolfram-full-rest
      resources:
        - path: /v1/queries
          name: queries
          description: "Full computational results from Wolfram|Alpha."
          operations:
            - method: GET
              name: query-full-results
              description: "Get full pod-based results from Wolfram|Alpha."
              call: "wolfram-full.query-full-results"
              with:
                input: "rest.input"
                output: "rest.output"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: wolfram-full-mcp
      transport: http
      tools:
        - name: query-wolfram-full
          description: "Query Wolfram|Alpha for full computational results with pod data."
          hints:
            readOnly: true
            openWorld: true
          call: "wolfram-full.query-full-results"
          with:
            input: "tools.input"
          outputParameters:
            - type: object
              mapping: "$."
