meters:
  - name: api_calls
    description: Count of Wolfram|Alpha API calls (Full Results, LLM, Simple, Short Answers, Spoken Results, Fast Query Recognizer, Summary Box, Instant Calculators) attributed to a developer account.
    unit: request
    aggregation: sum
    dimensions:
      - api
      - account
  - name: non_commercial_allowance_consumed
    description: Portion of the 2,000-call non-commercial monthly allowance consumed by a given account.
    unit: request
    aggregation: sum
    dimensions:
      - account
principles:
  - name: Visibility
    description: Track API consumption against the 2,000-call non-commercial monthly allowance via the Wolfram|Alpha Developer Portal; for paid Standard or Custom plans, request usage statements directly from Wolfram billing since usage telemetry is not exposed via a public API.
  - name: Allocation
    description: Use a distinct AppID per consuming application or environment so Wolfram-side call counts can be attributed to the right team or product when reconciling against invoices.
  - name: Optimization
    description: Choose the narrowest endpoint that returns the needed answer (Short Answers / Spoken Results / Simple over Full Results), tune scantimeout, podtimeout, and formattimeout to fail fast on expensive queries, and cache deterministic responses to stay inside the non-commercial allowance.
  - name: Accountability
    description: Assign a single owner per AppID; before crossing the 2,000-call non-commercial threshold or moving to commercial use, route procurement through Wolfram's purchase contact form so commitments and contractual terms are owned in finance rather than implicit in code.
